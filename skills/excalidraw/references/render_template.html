<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    /* No body background — we screenshot the SVG element directly, and a
       transparent body lets `omit_background=True` produce a true alpha PNG. */
    #root { display: inline-block; }
    #root svg { display: block; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="module">
    import utils from "https://esm.sh/@excalidraw/utils@0.1.2?bundle";
    const { exportToSvg } = utils;

    window.renderDiagram = async function(jsonData) {
      try {
        const data = typeof jsonData === "string" ? JSON.parse(jsonData) : jsonData;
        const elements = data.elements || [];
        const appState = data.appState || {};
        const files = data.files || {};

        // Default to white background unless caller has set viewBackgroundColor.
        // For transparent renders, the Python side sets exportBackground:false,
        // which we honor below.
        appState.viewBackgroundColor = appState.viewBackgroundColor || "#ffffff";
        appState.exportWithDarkMode = false;

        const svg = await exportToSvg({
          elements: elements,
          appState: {
            ...appState,
            exportBackground: appState.exportBackground !== false,
          },
          files: files,
        });

        // Excalidraw's SVG viewBox is tight to element bounds, so font ascenders
        // and descenders on edge elements get clipped. Expand viewBox + width/height
        // by a fixed pad so the screenshot includes breathing room.
        const PAD = 16;
        const vb = svg.getAttribute("viewBox");
        if (vb) {
          const [x, y, w, h] = vb.split(/\s+/).map(Number);
          svg.setAttribute("viewBox", `${x - PAD} ${y - PAD} ${w + 2 * PAD} ${h + 2 * PAD}`);
          const svgW = parseFloat(svg.getAttribute("width") || w);
          const svgH = parseFloat(svg.getAttribute("height") || h);
          svg.setAttribute("width", String(svgW + 2 * PAD));
          svg.setAttribute("height", String(svgH + 2 * PAD));
        }

        // Clear any previous render
        const root = document.getElementById("root");
        root.innerHTML = "";
        root.appendChild(svg);

        window.__renderComplete = true;
        window.__renderError = null;
        return { success: true, width: svg.getAttribute("width"), height: svg.getAttribute("height") };
      } catch (err) {
        window.__renderComplete = true;
        window.__renderError = err.message;
        return { success: false, error: err.message };
      }
    };

    // Signal that the module is loaded and ready
    window.__moduleReady = true;
  </script>
</body>
</html>
