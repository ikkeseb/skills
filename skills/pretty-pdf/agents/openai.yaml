interface:
  display_name: pretty-pdf
  short_description: >-
    Create visually polished, professionally designed PDFs with weasyprint
    (HTML+CSS to PDF) from new content or by re-typesetting a docx. Not for
    reading, merging, splitting, or form-filling existing PDFs, fillable
    AcroForm output, or quick throwaway PDFs.
policy:
  allow_implicit_invocation: false
